<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ 'dark' if session.get('dark_mode') else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | MySocial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('feed') }}">MySocial</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('feed') }}">🏠 Home</a></li>
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="{{ url_for('view_notifications') }}">🔔
                            <span id="unread-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none;"></span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}">👤 Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('inbox') }}">💬 Inbox</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('friends_list') }}">👥 Friends</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('search_users') }}">🔍 Search</a></li>
                    {% if session.get('isAdmin') %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_dashboard') }}">🛡️ Admin</a></li>
                    {% endif %}
                    <li class="nav-item">
                        <form action="{{ url_for('toggle_dark_mode') }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link">🌙/☀️</button>
                        </form>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">🚪 Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    {% if session.get('email_verified') == False %}
    <div class="alert alert-warning text-center mb-0 d-flex align-items-center justify-content-center gap-2 py-2">
        ⚠️ Email not verified.
        <form method="POST" action="{{ url_for('verify_email') }}" class="d-inline">
            <button type="submit" class="btn btn-sm btn-warning">Resend</button>
        </form>
        <form method="POST" action="{{ url_for('refresh_verification') }}" class="d-inline">
            <button type="submit" class="btn btn-sm btn-success">Refresh</button>
        </form>
    </div>
    {% endif %}

    <div class="container mt-4" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title mb-4">Edit Profile</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" value="{{ profile.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea name="bio" class="form-control" rows="3">{{ profile.bio or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Profile Picture URL</label>
                        <input type="url" name="profile_pic" class="form-control" value="{{ profile.profile_pic or '' }}" placeholder="https://example.com/photo.jpg">
                        <small class="text-muted">Paste a direct image URL.</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function updateUnreadBadge() {
            try {
                const resp = await fetch('/api/unread_notifications');
                const data = await resp.json();
                const badge = document.getElementById('unread-badge');
                if (data.unread > 0) {
                    badge.textContent = data.unread;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch(e) {}
        }
        updateUnreadBadge();
        setInterval(updateUnreadBadge, 10000);
    </script>
</body>
</html>
