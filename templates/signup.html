<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MySocial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">✨ Create Account</h2>
                <form method="POST" onsubmit="return validatePassword()">
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                        <div id="password-strength" class="form-text"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
            </div>
        </div>
    </div>
    <script>
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('password-strength');
        passwordInput.addEventListener('input', function() {
            const val = this.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (val.match(/[A-Z]/)) strength++;
            if (val.match(/[a-z]/)) strength++;
            if (val.match(/[0-9]/)) strength++;
            if (strength < 3) strengthDiv.textContent = 'Weak';
            else if (strength < 4) strengthDiv.textContent = 'Medium';
            else strengthDiv.textContent = 'Strong';
        });
        function validatePassword() {
            const p = passwordInput.value;
            if (p.length < 8) { alert('Password must be at least 8 characters.'); return false; }
            if (!/[A-Z]/.test(p)) { alert('Must contain an uppercase letter.'); return false; }
            if (!/[a-z]/.test(p)) { alert('Must contain a lowercase letter.'); return false; }
            if (!/[0-9]/.test(p)) { alert('Must contain a digit.'); return false; }
            return true;
        }
    </script>
</body>
</html>
