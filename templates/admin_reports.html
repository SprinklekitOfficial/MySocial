<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ 'dark' if session.get('dark_mode') else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('feed') }}">🏠 Main Site</a>
                <a class="nav-link" href="{{ url_for('logout') }}">🚪 Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Post Reports</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Post ID</th>
                    <th>Reported by</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for report in reports %}
                <tr>
                    <td><a href="{{ url_for('feed') }}#post-{{ report.post_id }}" target="_blank">{{ report.post_id[:8] }}...</a></td>
                    <td>{{ report.reporter_name }}</td>
                    <td>{{ report.timestamp }}</td>
                    <td>
                        {% if report.status == "pending" %}
                            <span class="badge bg-warning">Pending</span>
                        {% else %}
                            <span class="badge bg-secondary">Dismissed</span>
                        {% endif %}
                    </td>
                    <td>
                        <form method="POST" action="{{ url_for('dismiss_report', post_id=report.post_id, reporter_uid=report.reporter_uid) }}" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">Dismiss</button>
                        </form>
                        <a href="{{ url_for('feed') }}#post-{{ report.post_id }}" class="btn btn-sm btn-outline-primary" target="_blank">View Post</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
