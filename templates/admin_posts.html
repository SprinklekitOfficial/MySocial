<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ 'dark' if session.get('dark_mode') else 'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Posts | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('feed') }}">🏠 Main Site</a>
                <a class="nav-link" href="{{ url_for('logout') }}">🚪 Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>All Posts</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Content</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for post in posts %}
                <tr>
                    <td>{{ post.content[:50] }}...</td>
                    <td>{{ post.author_username }}</td>
                    <td>
                        {% if post.hidden %}
                            <span class="badge bg-warning">Hidden</span>
                        {% else %}
                            <span class="badge bg-success">Visible</span>
                        {% endif %}
                    </td>
                    <td>
                        <form method="POST" action="{{ url_for('toggle_hide', post_id=post.id) }}" style="display:inline;">
                            <button type="submit" class="btn btn-sm {% if post.hidden %}btn-outline-success{% else %}btn-outline-warning{% endif %}">
                                {% if post.hidden %}Unhide{% else %}Hide{% endif %}
                            </button>
                        </form>
                        <form method="POST" action="{{ url_for('delete_post', post_id=post.id) }}" style="display:inline;" onsubmit="return confirm('Delete this post permanently?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
